<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANELE BOT - إنشاء بوت جديد</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <a href="/dashboard" class="menu-item">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="/create_bot" class="menu-item active">
            <i class="fas fa-plus-circle"></i>
            <span>إنشاء بوت</span>
        </a>
        <div class="divider"></div>
        <a href="#" class="menu-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>تسجيل الخروج</span>
        </a>
    </div>

    <div class="container">
        <div class="create-bot-card">
            <h1><i class="fas fa-plus-circle"></i> إنشاء بوت جديد</h1>
            
            <form id="createBotForm">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> أيدي الحساب (UID)</label>
                    <input type="text" id="uid" placeholder="مثال: 4408991023" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="text" id="password" placeholder="كلمة المرور" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> اسم البوت</label>
                    <input type="text" id="bot_name" placeholder="مثال: SARGO" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-font"></i> الاسم المعروض</label>
                    <input type="text" id="display_name" placeholder="مثال: SARGO" required>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-plus"></i> إنشاء البوت
                </button>
            </form>
            
            <div id="message" style="display: none; margin-top: 20px; padding: 15px; border-radius: 10px;"></div>
        </div>
    </div>

    <script>
        function logout() {
            if(confirm('تسجيل الخروج؟')) window.location.href = '/logout';
        }

        document.getElementById('createBotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            const uid = document.getElementById('uid').value;
            const password = document.getElementById('password').value;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق من الحساب...';
            msg.style.display = 'none';
            
            // أولاً: التحقق من الحساب
            fetch('/verify_account', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({uid: uid, password: password})
            })
            .then(r => r.json())
            .then(verifyData => {
                if(!verifyData.success) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-plus"></i> إنشاء البوت';
                    msg.style.display = 'block';
                    msg.className = 'error-message';
                    msg.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + verifyData.message;
                    return;
                }
                
                // ثانياً: إنشاء البوت
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء البوت...';
                
                fetch('/create_bot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        uid: uid,
                        password: password,
                        bot_name: document.getElementById('bot_name').value,
                        display_name: document.getElementById('display_name').value
                    })
                })
                .then(r => r.json())
                .then(d => {
                    if(d.success) {
                        msg.style.display = 'block';
                        msg.className = 'success-message';
                        msg.innerHTML = '<i class="fas fa-check-circle"></i> تم إنشاء البوت بنجاح!';
                        setTimeout(() => window.location.href = '/dashboard', 2000);
                    } else {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-plus"></i> إنشاء البوت';
                        msg.style.display = 'block';
                        msg.className = 'error-message';
                        msg.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + d.error;
                    }
                });
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-plus"></i> إنشاء البوت';
                msg.style.display = 'block';
                msg.className = 'error-message';
                msg.innerHTML = '<i class="fas fa-exclamation-circle"></i> خطأ في الاتصال';
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>

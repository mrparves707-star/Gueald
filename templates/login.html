<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANELE BOT - تسجيل الدخول</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>9SF TEAM</h1>
                <p>نظام إدارة البوتات المتقدم</p>
            </div>
            
            {% if error %}
            <div class="error">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}
            
            <form action="/login" method="POST">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <input type="text" name="username" placeholder="أدخل اسم المستخدم" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" name="password" placeholder="أدخل كلمة المرور" required>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </form>
            
            <div class="footer-text">
                <i class="fas fa-crown"></i> المطور: @L3abassi1235 @ff_9SF_07
            </div>
        </div>
    </div>
</body>
</html>
